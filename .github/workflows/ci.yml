name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NotificationModule.sln

      - name: Build
        run: dotnet build NotificationModule.sln -c Release --no-restore

      - name: Test
        run: dotnet test NotificationModule.sln -c Release --no-build --verbosity minimal

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build producer and consumer images
        run: docker compose --env-file env.example build producer consumer
