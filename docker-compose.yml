services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI  →  http://localhost:15672  (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notification}
      POSTGRES_DB: notification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 5s
      timeout: 5s
      retries: 10

  comworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: comworld
    ports:
      - "1337:8080" # Provider docs  →  http://localhost:1337

  producer:
    build:
      context: .
      dockerfile: src/NotificationModule.Producer/Dockerfile
    container_name: notification-producer
    ports:
      - "5001:8080"
    environment:
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - NotificationDb__ConnectionString=Host=postgres;Port=5432;Database=notification;Username=notification;Password=${POSTGRES_PASSWORD:-notification}
      - Organizations__Default__Key=${DEFAULT_ORGANIZATION_KEY:-default}
      - Organizations__Default__Name=${DEFAULT_ORGANIZATION_NAME:-Default Organization}
      - Organizations__Default__TimeZone=${DEFAULT_ORGANIZATION_TIMEZONE:-UTC}
      - Scheduler__PollIntervalSeconds=${SCHEDULER_POLL_INTERVAL_SECONDS:-30}
      - Scheduler__BatchSize=${SCHEDULER_BATCH_SIZE:-25}
      - OpenTelemetry__ServiceName=notification-producer
      - OpenTelemetry__Environment=docker
      - OpenTelemetry__Otlp__Endpoint=http://otel-collector:4317
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  consumer:
    build:
      context: .
      dockerfile: src/NotificationModule.Consumer/Dockerfile
    container_name: notification-consumer
    ports:
      - "5002:8080"
    environment:
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Providers__StudentGroup=group-2dot4
      - Providers__SwiftSend__BaseUrl=http://comworld:8080
      - Providers__SecurePost__BaseUrl=http://comworld:8080
      - Providers__SecurePost__AuthEndpoint=/securepost/auth
      - Providers__SecurePost__MessageEndpoint=/securepost/message
      - Providers__LegacyLink__BaseUrl=http://comworld:8080
      - Providers__AsyncFlow__BaseUrl=http://comworld:8080
      - SecretsDb__ConnectionString=Host=postgres;Port=5432;Database=notification;Username=notification;Password=${POSTGRES_PASSWORD:-notification}
      - Secrets__MasterKeyBase64=${SECRETS_MASTER_KEY_BASE64}
      - SecretsSeed__SwiftSend__ApiKey=${SECRETS_SEED_SWIFTSEND_API_KEY}
      - SecretsSeed__SecurePost__ClientId=${SECRETS_SEED_SECUREPOST_CLIENT_ID}
      - SecretsSeed__SecurePost__ClientSecret=${SECRETS_SEED_SECUREPOST_CLIENT_SECRET}
      - SecretsSeed__LegacyLink__Username=${SECRETS_SEED_LEGACYLINK_USERNAME}
      - SecretsSeed__LegacyLink__Password=${SECRETS_SEED_LEGACYLINK_PASSWORD}
      - SecretsSeed__AsyncFlow__ApiKey=${SECRETS_SEED_ASYNCFLOW_API_KEY}
      - Organizations__Default__Key=${DEFAULT_ORGANIZATION_KEY:-default}
      - Organizations__Default__Name=${DEFAULT_ORGANIZATION_NAME:-Default Organization}
      - Organizations__Default__TimeZone=${DEFAULT_ORGANIZATION_TIMEZONE:-UTC}
      - OpenTelemetry__ServiceName=notification-consumer
      - OpenTelemetry__Environment=docker
      - OpenTelemetry__Otlp__Endpoint=http://otel-collector:4317
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.2
    container_name: notification-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-notification}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: notification-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./observability/otel/otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: notification-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4319:4317"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: notification-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro

volumes:
  postgres_data:
  grafana_data:
